name: Kerää LAM-data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keraa:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Kerää LAM-data Supabaseen
        run: python scripts/keraa_lam.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
